<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISMS-P 준비 진단기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a4fd6;
      --primary-dark: #1240b0;
      --primary-light: #e8effe;
      --accent: #0ea5e9;
      --success: #10b981;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fafc;
      --card: #ffffff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg: 0 8px 32px rgba(26,79,214,.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo',
                   'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 16px 80px;
      line-height: 1.6;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .badge {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .header p {
      color: var(--text-muted);
      font-size: 15px;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 20px;
    }

    .card-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-label span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      font-size: 11px;
    }

    /* Option grid */
    .options {
      display: grid;
      gap: 10px;
    }
    .options.col2 { grid-template-columns: repeat(2, 1fr); }
    .options.col3 { grid-template-columns: repeat(3, 1fr); }

    .option-btn {
      position: relative;
      cursor: pointer;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      background: #fff;
      text-align: center;
      transition: all .18s ease;
      user-select: none;
    }
    .option-btn input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .option-btn .opt-icon { font-size: 22px; margin-bottom: 6px; display: block; }
    .option-btn .opt-title { font-size: 14px; font-weight: 700; display: block; }
    .option-btn .opt-desc { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: block; }

    .option-btn:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .option-btn.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(26,79,214,.15);
    }
    .option-btn.selected .opt-title { color: var(--primary); }
    .option-btn.selected::after {
      content: '✓';
      position: absolute;
      top: 8px; right: 10px;
      font-size: 13px;
      color: var(--primary);
      font-weight: 800;
    }

    /* CTA Button */
    .cta-wrap { text-align: center; margin-top: 8px; }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 16px 36px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s ease;
      box-shadow: 0 4px 14px rgba(26,79,214,.35);
      letter-spacing: -.01em;
    }
    .cta-btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,79,214,.4); }
    .cta-btn:active { transform: translateY(0); }
    .cta-btn:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; transform: none; }

    /* Result */
    #result { display: none; }
    #result.visible { display: block; animation: fadeUp .35s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
    }
    .result-icon {
      flex-shrink: 0;
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .result-title { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; }
    .result-subtitle { font-size: 18px; font-weight: 800; letter-spacing: -.02em; }

    .items-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      transition: box-shadow .15s;
    }
    .item:hover { box-shadow: var(--shadow); }
    .item-rank {
      flex-shrink: 0;
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 800;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .item:nth-child(1) .item-rank { background: #fef3c7; color: #d97706; }
    .item:nth-child(2) .item-rank { background: #f1f5f9; color: #64748b; }
    .item:nth-child(3) .item-rank { background: #fde8d8; color: #c2410c; }

    .item-body { flex: 1; min-width: 0; }
    .item-code {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      background: var(--primary-light);
      border-radius: 5px;
      padding: 2px 7px;
      margin-bottom: 5px;
      letter-spacing: .03em;
    }
    .item-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .item-detail { font-size: 13px; color: var(--text-muted); }

    .urgency-tag {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .urgency-high { background: #fee2e2; color: #dc2626; }
    .urgency-mid  { background: #fef3c7; color: #d97706; }
    .urgency-low  { background: #dcfce7; color: #16a34a; }

    .disclaimer {
      margin-top: 16px;
      padding: 12px 16px;
      background: #f8fafc;
      border-left: 3px solid var(--primary);
      border-radius: 0 8px 8px 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    .reset-btn {
      display: block;
      margin: 20px auto 0;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
    }
    .reset-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    @media (max-width: 480px) {
      .options.col3 { grid-template-columns: repeat(2, 1fr); }
      .header h1 { font-size: 22px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">무료 진단</div>
    <h1>ISMS-P 준비 진단기</h1>
    <p>업종과 규모를 선택하면 지금 당장 해야 할<br>핵심 준비 항목을 알려드립니다.</p>
  </div>

  <!-- Step 1 -->
  <div class="card">
    <div class="card-label"><span>1</span> 업종을 선택하세요</div>
    <div class="options col2" id="industry-opts">
      <label class="option-btn">
        <input type="radio" name="industry" value="it">
        <span class="opt-icon">💻</span>
        <span class="opt-title">IT서비스</span>
        <span class="opt-desc">SaaS · 앱 · 플랫폼</span>
      </label>
      <label class="option-btn">
        <input type="radio" name="industry" value="shop">
        <span class="opt-icon">🛒</span>
        <span class="opt-title">쇼핑몰</span>
        <span class="opt-desc">온라인 커머스 · 오픈마켓</span>
      </label>
      <label class="option-btn">
        <input type="radio" name="industry" value="hospital">
        <span class="opt-icon">🏥</span>
        <span class="opt-title">병원</span>
        <span class="opt-desc">의원 · 종합병원 · 의료기관</span>
      </label>
      <label class="option-btn">
        <input type="radio" name="industry" value="other">
        <span class="opt-icon">🏢</span>
        <span class="opt-title">기타</span>
        <span class="opt-desc">제조 · 금융 · 공공 등</span>
      </label>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="card">
    <div class="card-label"><span>2</span> 기업 규모를 선택하세요</div>
    <div class="options col2" id="size-opts">
      <label class="option-btn">
        <input type="radio" name="size" value="small">
        <span class="opt-icon">🌱</span>
        <span class="opt-title">소기업</span>
        <span class="opt-desc">매출 300억 미만</span>
      </label>
      <label class="option-btn">
        <input type="radio" name="size" value="large">
        <span class="opt-icon">🌳</span>
        <span class="opt-title">중기업</span>
        <span class="opt-desc">매출 300억 이상</span>
      </label>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <button class="cta-btn" id="diagnose-btn" onclick="diagnose()" disabled>
      <span>🔍</span> 지금 진단하기
    </button>
  </div>

  <!-- Result -->
  <div id="result" class="card" style="margin-top:28px;">
    <div class="result-header">
      <div class="result-icon">📋</div>
      <div>
        <div class="result-title" id="result-label"></div>
        <div class="result-subtitle">지금 당장 준비해야 할 ISMS-P 항목 TOP 5</div>
      </div>
    </div>
    <ul class="items-list" id="items-list"></ul>
    <div class="disclaimer">
      ※ 본 진단 결과는 일반적인 가이드라인이며, 실제 인증 준비 시 전문 컨설턴트 검토를 권장합니다.
      인증 의무 대상 여부는 개인정보보호법 및 정보통신망법 기준을 별도로 확인하세요.
    </div>
    <button class="reset-btn" onclick="reset()">↺ 다시 진단하기</button>
  </div>

</div>

      ],
      large: [
        ['1.1.2', '의료정보 보호 종합 정책 수립 및 보안 조직 구성', 'CPO·CISO 임원급 지정, 개인정보보호위원회 설치, 연간 의료정보 보호계획 수립 및 경영진 보고', 'high'],
        ['2.6.2', 'EMR·HIS·PACS 시스템 접근통제 고도화', '시스템별 직무 기반 접근권한 설정, 접근 로그 수집·분석 체계 구축, 비정상 접근 실시간 탐지', 'high'],
        ['1.4.1', '개인정보 영향평가(PIA) 의무 대상 여부 확인', '공공의료기관 또는 대규모 민감정보 처리 시 PIA 의무 — 전문기관 의뢰 및 결과 이행계획 수립', 'high'],
        ['2.11.4', '침해사고 대응 계획 수립 및 정기 모의훈련', '랜섬웨어·내부 유출 등 시나리오별 대응 매뉴얼 작성, 연 1회 이상 모의훈련 실시 및 결과 개선', 'mid'],
        ['1.4.2', '내부 감사 및 연간 위험평가 체계 구축', '의료기관 특성에 맞는 위험평가 기준 수립, 반기 내부 점검반 운영 및 감사 결과 경영진 보고', 'mid'],
      ],
    },
    other: {
      small: [
        ['3.5.1', '개인정보 처리방침 작성 및 공개', '개인정보를 한 건이라도 수집한다면 처리방침 작성은 법적 의무 — 홈페이지 또는 사업장 게시', 'high'],
        ['3.2.1', '개인정보 처리 대장 작성', '누가, 어떤 개인정보를, 왜, 얼마나 보관하는지 현황을 파악하고 처리 대장으로 문서화', 'high'],
        ['1.1.2', '개인정보 보호책임자(CPO) 지정 및 역할 정의', '임원 또는 부서장급 CPO 지정, 역할·책임 내부 문서화 및 홈페이지 공개', 'mid'],
        ['2.2.4', '임직원 보안 교육 체계 수립 (연 1회 이상)', '전 직원 대상 개인정보보호·정보보안 교육 실시 및 이수 기록 보관', 'mid'],
        ['3.3.2', '개인정보 처리 위탁 현황 파악 및 계약서 정비', '급여대행·회계·IT아웃소싱 등 수탁사 목록 파악 및 보안 의무 조항 포함 계약 체결', 'low'],
      ],
      large: [
        ['1.1.4', 'ISMS-P 인증 의무 대상 여부 확인 및 범위 설정', '연 매출 1,500억 또는 일평균 이용자 100만 이상 의무 기준 해당 여부 확인, 인증 범위 정의', 'high'],
        ['1.1.2', '정보보호 거버넌스 체계 구축', 'CISO·CPO 임원급 지정, 정보보호위원회 운영, 연간 정보보호 계획 수립 및 경영진 보고', 'high'],
        ['1.2.3', '개인정보 처리시스템 현황 파악 및 위험평가', '전사 시스템별 개인정보 흐름도 작성, 위험평가 수행 및 개선 로드맵 수립', 'high'],
        ['2.11.5', '침해사고 대응 절차 수립 및 모의훈련 실시', '시나리오별 대응 매뉴얼 작성, 연 1회 이상 모의훈련, 72시간 신고 절차 내재화', 'mid'],
        ['1.4.2', '내부 감사 및 규정 준수 점검 체계 마련', '반기 또는 연 1회 내부 감사반 구성, 위반사항 시정 및 경영진 보고 체계 수립', 'mid'],
      ],
    },
  };

  const URGENCY_LABELS = { high: '즉시', mid: '1개월', low: '3개월' };
  const URGENCY_CLS   = { high: 'urgency-high', mid: 'urgency-mid', low: 'urgency-low' };

  const INDUSTRY_NAMES = { it: 'IT서비스', shop: '쇼핑몰', hospital: '병원', other: '기타' };
  const SIZE_NAMES     = { small: '소기업 (매출 300억 미만)', large: '중기업 (매출 300억 이상)' };

  let selIndustry = null, selSize = null;

  // Radio click handlers
  document.querySelectorAll('#industry-opts .option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#industry-opts .option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selIndustry = btn.querySelector('input').value;
      updateBtn();
    });
  });

  document.querySelectorAll('#size-opts .option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#size-opts .option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selSize = btn.querySelector('input').value;
      updateBtn();
    });
  });

  function updateBtn() {
    document.getElementById('diagnose-btn').disabled = !(selIndustry && selSize);
  }

  function diagnose() {
    if (!selIndustry || !selSize) return;

    const items = DATA[selIndustry][selSize];
    const resultEl = document.getElementById('result');
    const listEl   = document.getElementById('items-list');
    const labelEl  = document.getElementById('result-label');

    labelEl.textContent = `${INDUSTRY_NAMES[selIndustry]} · ${SIZE_NAMES[selSize]} 기준`;

    listEl.innerHTML = items.map((item, i) => `
      <li class="item">
        <div class="item-rank">${i + 1}</div>
        <div class="item-body">
          <div class="item-code">${item[0].split('.').slice(0, 2).join('.')}</div>
          <div class="item-title">${item[1]}</div>
          <div class="item-detail">${item[2]}</div>
        </div>
        <span class="urgency-tag ${URGENCY_CLS[item[3]]}">${URGENCY_LABELS[item[3]]}</span>
      </li>
    `).join('');

    resultEl.classList.remove('visible');
    resultEl.style.display = 'block';
    void resultEl.offsetWidth; // reflow for animation
    resultEl.classList.add('visible');
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function reset() {
    selIndustry = null; selSize = null;
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('input[type=radio]').forEach(r => r.checked = false);
    document.getElementById('result').style.display = 'none';
    document.getElementById('result').classList.remove('visible');
    document.getElementById('diagnose-btn').disabled = true;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
